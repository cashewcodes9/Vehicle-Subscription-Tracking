name: Deploy to SAP BTP Cloud Foundry

on:
  push:
    branches: [main]
  workflow_dispatch:        # lets you trigger manually from the Actions tab

env:
  CF_API: https://api.cf.us10-001.hana.ondemand.com
  HDI_SERVICE: vehicle-subscription-tracking-db-hdi-container

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install CAP CLI
        run: npm install -g @sap/cds-dk

      - name: Build CAP project
        run: cds build --production

      - name: Install Cloud Foundry CLI
        run: |
          curl -sL "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=v8&source=github" | tar -zx
          sudo mv cf8 /usr/local/bin/cf
          cf version

      - name: Authenticate to Cloud Foundry
        run: |
          cf api "$CF_API"
          cf auth "$CF_USERNAME" "$CF_PASSWORD"
          cf target -o "$CF_ORG" -s "$CF_SPACE"
        env:
          CF_USERNAME: ${{ secrets.CF_USERNAME }}
          CF_PASSWORD: ${{ secrets.CF_PASSWORD }}
          CF_ORG: ${{ secrets.CF_ORG }}
          CF_SPACE: ${{ secrets.CF_SPACE }}

      - name: Ensure HDI container exists (idempotent)
        run: |
          if ! cf service "$HDI_SERVICE" >/dev/null 2>&1; then
            cf create-service hana hdi-shared "$HDI_SERVICE" --wait
          else
            echo "Service $HDI_SERVICE already exists, skipping."
          fi

      - name: Deploy database (HDI deployer)
        run: cf push -f manifest-db.yml

      - name: Deploy CAP service
        run: cf push -f manifest-srv.yml